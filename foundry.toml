[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 256
depth = 64
fail_on_revert = false

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 512, depth = 128 }
